<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Translation · Gemini Live API</title>
<style>
  :root {
    --bg: #0f1221;
    --panel: #171a2e;
    --panel-2: #1e2340;
    --line: #2b3157;
    --text: #e7e9f5;
    --muted: #9aa0c7;
    --in: #2563eb;
    --out: #16a34a;
    --accent: #7c3aed;
    --danger: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 12px 18px; background: var(--panel); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .spacer { flex: 1; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #555; }
  .dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
  .dot.connecting { background: #eab308; }
  .dot.error { background: var(--danger); }

  .controls {
    padding: 10px 18px; background: var(--panel); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  select {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 10px; font-size: 13px; min-width: 190px;
  }
  button {
    border: none; border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; color: #fff; background: var(--accent);
  }
  button.rec { background: var(--in); }
  button.rec.recording { background: var(--danger); }
  button:disabled { opacity: .5; cursor: not-allowed; }

  .toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); }
  .switch { position: relative; width: 42px; height: 24px; }
  .switch input { display: none; }
  .slider {
    position: absolute; inset: 0; background: #3a3f66; border-radius: 999px; transition: .2s;
  }
  .slider::before {
    content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .2s;
  }
  .switch input:checked + .slider { background: var(--out); }
  .switch input:checked + .slider::before { transform: translateX(18px); }
  .switch input:disabled + .slider { opacity: .4; }

  main { flex: 1; display: flex; min-height: 0; }
  .chat-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .columns { flex: 1; display: flex; min-height: 0; }
  .col { flex: 1; display: flex; flex-direction: column; min-width: 0; border-right: 1px solid var(--line); }
  .col:last-child { border-right: none; }
  .col-head {
    padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--muted);
    border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 8px;
  }
  .col-head .badge { width: 8px; height: 8px; border-radius: 50%; }
  .col.input .badge { background: var(--in); }
  .col.output .badge { background: var(--out); }
  .msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .bubble {
    max-width: 92%; padding: 9px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4;
    background: var(--panel-2); border: 1px solid var(--line); white-space: pre-wrap; word-break: break-word;
  }
  .col.input .bubble { align-self: flex-start; border-left: 3px solid var(--in); }
  .col.output .bubble { align-self: flex-end; border-right: 3px solid var(--out); }
  .bubble .meta { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
  .bubble.pending { opacity: .8; }

  .raw {
    height: 200px; border-top: 1px solid var(--line); background: #0b0d18; display: flex; flex-direction: column;
  }
  .raw-head {
    padding: 6px 14px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .raw-head button { padding: 4px 10px; font-size: 11px; background: #2b3157; }
  #rawLog {
    flex: 1; overflow-y: auto; margin: 0; padding: 10px 14px; font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px; color: #a9e3c0; white-space: pre-wrap; word-break: break-all;
  }
</style>
</head>
<body>
  <header>
    <h1>🎙️ Live Translation · Gemini Live API</h1>
    <span id="modelName" class="status"></span>
    <div class="spacer"></div>
    <div class="status"><span id="wsDot" class="dot"></span> Server</div>
    <div class="status"><span id="apiDot" class="dot"></span> Live API</div>
  </header>

  <div class="controls">
    <div class="field">
      <label>Input language</label>
      <select id="sourceLang"></select>
    </div>
    <div class="field">
      <label>Output language</label>
      <select id="targetLang"></select>
    </div>

    <button id="recBtn" class="rec">▶ Start</button>

    <label class="toggle">
      <span class="switch"><input type="checkbox" id="playToggle" checked><span class="slider"></span></span>
      Play audio
    </label>

    <label class="toggle" title="Toggle DeepFilterNet2 denoising in real time for A/B comparison">
      <span class="switch"><input type="checkbox" id="denoiseToggle"><span class="slider"></span></span>
      DeepFilterNet2 <span id="denoiseState" style="color:var(--muted);font-size:11px;"></span>
    </label>
  </div>

  <main>
    <div class="chat-wrap">
      <div class="columns">
        <section class="col input">
          <div class="col-head"><span class="badge"></span> Input (transcription)</div>
          <div id="inputMsgs" class="msgs"></div>
        </section>
        <section class="col output">
          <div class="col-head"><span class="badge"></span> Output (translation)</div>
          <div id="outputMsgs" class="msgs"></div>
        </section>
      </div>

      <div class="raw">
        <div class="raw-head">
          Raw messages (data return format)
          <div class="spacer" style="flex:1"></div>
          <button id="clearRaw">Clear</button>
        </div>
        <pre id="rawLog"></pre>
      </div>
    </div>
  </main>

<script>
const INPUT_SAMPLE_RATE = 16000;   // sent to Live API
const OUTPUT_SAMPLE_RATE = 24000;  // received translated audio

let ws = null;
let audioCtx = null;         // capture context (16 kHz)
let workletNode = null;
let micStream = null;
let recording = false;

let playCtx = null;          // playback context (24 kHz)
let playHead = 0;            // scheduling pointer for gapless playback

// Track chat bubbles + accumulated text per (seq,type). The backend streams
// only deltas; the frontend accumulates them for display and the raw panel.
const bubbles = {};          // key `${seq}-${type}` -> element
const acc = {};              // key `${seq}-${type}` -> accumulated string

const $ = (id) => document.getElementById(id);

// ---------------- Config / dropdowns ----------------
async function loadConfig() {
  const cfg = await (await fetch('/config')).json();
  const src = $('sourceLang'), tgt = $('targetLang');
  for (const lang of cfg.languages) {
    const label = lang.name + (lang.preview ? '  (Preview)' : '') + ' — ' + lang.code;
    src.add(new Option(label, lang.code));
    tgt.add(new Option(label, lang.code));
  }
  src.value = cfg.default_source_code;
  tgt.value = cfg.default_target_code;

  $('modelName').textContent = cfg.model || '';

  const dt = $('denoiseToggle');
  if (!cfg.denoiser_available) {
    dt.checked = false; dt.disabled = true;
    $('denoiseState').textContent = '(unavailable)';
  } else {
    dt.checked = !!cfg.denoiser_enabled;
    $('denoiseState').textContent = '(' + (cfg.denoiser_model || 'on') + ')';
  }
}

// ---------------- WebSocket ----------------
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setDot('wsDot', 'connected');
    // Tell the backend the current playback state so it only streams audio when wanted.
    send({ action: 'set_audio_output', enabled: $('playToggle').checked });
  };
  ws.onclose = () => { setDot('wsDot', ''); setDot('apiDot', ''); setTimeout(connectWS, 2000); };
  ws.onerror = () => setDot('wsDot', 'error');

  ws.onmessage = (ev) => {
    if (ev.data instanceof ArrayBuffer) { playAudio(ev.data); return; }
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.kind === 'data') { handleData(msg.data); }
    else if (msg.kind === 'status' && msg.live_api_status) {
      setDot('apiDot', msg.live_api_status.state);
    }
  };
}

function setDot(id, state) {
  const el = $(id);
  el.className = 'dot' + (state ? ' ' + state : '');
}

// ---------------- Data-contract handling ----------------
function handleData(d) {
  const key = `${d.seq}-${d.type}`;
  const finished = (d.finished === true || d.finished === 'true');

  // Accumulate the delta into the full message for this (seq,type).
  const text = (acc[key] || '') + (d.delta || '');
  acc[key] = text;

  // Raw panel — show the documented data format (accumulated `message`).
  appendRaw('data:' + JSON.stringify({
    uid: d.uid, seq: d.seq, type: d.type, message: text, finished: finished
  }));

  // Don't create an empty bubble for a bare finished-marker with no text.
  if (!text && finished) return;

  const container = d.type === 1 ? $('inputMsgs') : $('outputMsgs');
  let el = bubbles[key];
  if (!el) {
    el = document.createElement('div');
    el.className = 'bubble pending';
    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = `seq ${d.seq} · ${d.type === 1 ? 'input' : 'translation'}`;
    const body = document.createElement('div');
    body.className = 'body';
    el.appendChild(meta); el.appendChild(body);
    container.appendChild(el);
    bubbles[key] = el;
  }
  el.querySelector('.body').textContent = text;
  if (finished) el.classList.remove('pending');
  container.scrollTop = container.scrollHeight;
}

function appendRaw(line) {
  const log = $('rawLog');
  log.textContent += line + '\n';
  log.scrollTop = log.scrollHeight;
}

// ---------------- Audio playback (24 kHz PCM) ----------------
function playAudio(buffer) {
  if (!$('playToggle').checked) return;   // audio-output toggle
  if (!playCtx) playCtx = new (window.AudioContext || window.webkitAudioContext)();
  const int16 = new Int16Array(buffer);
  if (int16.length === 0) return;
  const f32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768;
  const audioBuffer = playCtx.createBuffer(1, f32.length, OUTPUT_SAMPLE_RATE);
  audioBuffer.getChannelData(0).set(f32);
  const src = playCtx.createBufferSource();
  src.buffer = audioBuffer;
  src.connect(playCtx.destination);
  const now = playCtx.currentTime;
  if (playHead < now) playHead = now;
  src.start(playHead);
  playHead += audioBuffer.duration;
}

// ---------------- Recording (mic -> 16 kHz PCM -> WS) ----------------
async function startRecording() {
  micStream = await navigator.mediaDevices.getUserMedia({
    audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true }
  });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: INPUT_SAMPLE_RATE });
  await audioCtx.audioWorklet.addModule('/static/audio-processor.js');
  const source = audioCtx.createMediaStreamSource(micStream);
  workletNode = new AudioWorkletNode(audioCtx, 'audio-processor');
  workletNode.port.onmessage = (e) => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(e.data);
  };
  source.connect(workletNode);
  workletNode.connect(audioCtx.destination);

  send({ action: 'start_session' });
  recording = true;
  const btn = $('recBtn');
  btn.textContent = '■ Stop'; btn.classList.add('recording');
}

function stopRecording() {
  send({ action: 'stop_session' });
  if (workletNode) { workletNode.disconnect(); workletNode = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  recording = false;
  const btn = $('recBtn');
  btn.textContent = '▶ Start'; btn.classList.remove('recording');
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// ---------------- UI wiring ----------------
$('recBtn').onclick = async () => {
  try {
    if (!recording) await startRecording(); else stopRecording();
  } catch (err) {
    alert('Microphone error: ' + err.message);
  }
};

function sendLanguages() {
  const s = $('sourceLang'), t = $('targetLang');
  send({
    source_language: s.options[s.selectedIndex].text,
    source_language_code: s.value,
    target_language: t.options[t.selectedIndex].text,
    target_language_code: t.value,
  });
}
$('sourceLang').onchange = sendLanguages;
$('targetLang').onchange = sendLanguages;

$('denoiseToggle').onchange = (e) => send({ action: 'set_denoiser', enabled: e.target.checked });
$('playToggle').onchange = (e) => {
  send({ action: 'set_audio_output', enabled: e.target.checked });
  if (!e.target.checked) playHead = 0;  // drop any queued playback when muting
};
$('clearRaw').onclick = () => { $('rawLog').textContent = ''; };

// ---------------- Boot ----------------
(async () => { await loadConfig(); connectWS(); })();
</script>
</body>
</html>
