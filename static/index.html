<!DOCTYPE html>
<html>
<head>
    <title>Demo</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
            overflow: hidden;
        }
        /* ---------- Main content column ---------- */
        #main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
            height: 100vh;
            overflow: hidden;
        }
        /* ---------- Right-side Navigation Sidebar ---------- */
        #nav-bar {
            width: 220px;
            min-width: 220px;
            background-color: #2c3e50;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 20px 16px;
            box-sizing: border-box;
            box-shadow: -2px 0 8px rgba(0, 0, 0, 0.2);
            gap: 16px;
            overflow-y: auto;
        }
        #nav-bar .nav-title {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #34495e;
        }
        #nav-bar .nav-section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #95a5a6;
            margin-bottom: 4px;
        }
        #nav-bar select,
        #nav-bar button.nav-btn {
            width: 100%;
            padding: 8px 10px;
            font-size: 13px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            box-sizing: border-box;
        }
        #nav-bar select {
            background-color: #fff;
            color: #2c3e50;
        }
        #nav-bar button.nav-btn {
            background-color: #5bc0de;
            color: #fff;
        }
        #nav-bar .status-pill {
            background-color: #34495e;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            text-align: center;
        }
        #nav-bar .ws-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #34495e;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        #nav-bar .ws-status .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #95a5a6;
            box-shadow: 0 0 4px rgba(0,0,0,0.4);
            flex-shrink: 0;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        #nav-bar .ws-status.connected .status-dot {
            background-color: #2ecc71;
            box-shadow: 0 0 6px #2ecc71;
        }
        #nav-bar .ws-status.disconnected .status-dot {
            background-color: #e74c3c;
            box-shadow: 0 0 6px #e74c3c;
        }
        #nav-bar .ws-status.connecting .status-dot {
            background-color: #f1c40f;
            box-shadow: 0 0 6px #f1c40f;
            animation: pulse 1.2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%   { opacity: 1; }
            50%  { opacity: 0.4; }
            100% { opacity: 1; }
        }
        /* ---------- Chat ---------- */
        #chat-container {
            flex-grow: 1;
            width: 90%;
            max-width: 800px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-self: center;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
        }
        .user-message {
            background-color: #dcf8c6;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .bot-message {
            background-color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .message-text {
            margin-bottom: 10px;
        }
        audio {
            width: 100%;
            outline: none;
        }
        /* ---------- Language & recording controls ---------- */
        #language-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background-color: #fff;
            width: 100%;
            box-sizing: border-box;
        }
        #controls {
            padding: 16px 20px;
            background-color: #fff;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
        }
        button:disabled {
            background-color: #ccc;
        }
        select {
            padding: 8px;
            font-size: 15px;
        }
    </style>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const navAutoplayBtn = document.getElementById('navAutoplayBtn');
        const playbackModeSelect = document.getElementById('playbackMode');
        const modeStatus = document.getElementById('modeStatus');
        const applyLangBtn = document.getElementById('applyLangBtn');
        const languageASelect = document.getElementById('languageA');
        const languageBSelect = document.getElementById('languageB');
        const chatContainer = document.getElementById('chat-container');
        const wsStatusEl = document.getElementById('wsStatus');
        const wsStatusText = document.getElementById('wsStatusText');
        const liveApiStatusEl = document.getElementById('liveApiStatus');
        const liveApiStatusText = document.getElementById('liveApiStatusText');

        let socket;
        let audioContext;
        let audioWorkletNode;
        let input;
        let globalStream;
        let recordedChunks = [];
        let userMessageDiv;
        let botMessageDiv;

        // ---------- Playback state ----------
        // Playback modes:
        //   'streaming'      : play each audio blob as soon as it arrives.
        //   'turn_complete'  : buffer all audio chunks for the current turn and
        //                      play them as one consolidated clip when the
        //                      backend signals turn_complete.
        let playbackMode = 'turn_complete';
        let audioQueue = [];          // queued audio object URLs ready for playback
        let pendingTurnChunks = [];   // raw PCM ArrayBuffers buffered for current turn
        // Tracks in-flight arrayBuffer() promises so that turn_complete waits
        // for all blobs to be decoded before flushing (fixes race condition).
        let pendingBlobPromises = [];
        let isPlaying = false;
        let autoplayEnabled = true;
        const audioPlayer = new Audio();

        // ---------- Sidebar handlers ----------
        navAutoplayBtn.addEventListener('click', () => {
            autoplayEnabled = !autoplayEnabled;
            navAutoplayBtn.textContent = `Autoplay: ${autoplayEnabled ? 'ON' : 'OFF'}`;
            if (!autoplayEnabled) {
                audioQueue = [];
                pendingTurnChunks = [];
            }
        });

        playbackModeSelect.addEventListener('change', () => {
            playbackMode = playbackModeSelect.value;
            modeStatus.textContent = playbackMode;
            // When switching to streaming mid-turn, flush buffered chunks immediately.
            if (playbackMode === 'streaming' && pendingTurnChunks.length > 0) {
                flushPendingTurn();
            }
        });

        audioPlayer.addEventListener('ended', () => {
            isPlaying = false;
            playNextInQueue();
        });

        function playNextInQueue() {
            if (audioQueue.length === 0 || isPlaying || !autoplayEnabled) return;
            isPlaying = true;
            const audioURL = audioQueue.shift();
            audioPlayer.src = audioURL;
            audioPlayer.play().catch(err => {
                console.error('Audio playback failed, requeueing:', err);
                isPlaying = false;
                audioQueue.unshift(audioURL);
            });
        }

        function enqueueWavFromPcm(pcmBuffer) {
            const blob = pcmToWav(pcmBuffer, 24000, 1);
            audioQueue.push(URL.createObjectURL(blob));
            playNextInQueue();
        }

        function flushPendingTurn() {
            if (pendingTurnChunks.length === 0) return;
            const totalLength = pendingTurnChunks.reduce(
                (acc, chunk) => acc + chunk.byteLength, 0,
            );
            const combined = new Uint8Array(totalLength);
            let offset = 0;
            for (const chunk of pendingTurnChunks) {
                combined.set(new Uint8Array(chunk), offset);
                offset += chunk.byteLength;
            }
            pendingTurnChunks = [];
            enqueueWavFromPcm(combined.buffer);
        }

        // ---------- PCM -> WAV helper ----------
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        function pcmToWav(pcmData, sampleRate, numChannels) {
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            const pcmLength = pcmData.byteLength;
            const totalLength = pcmLength + 44;

            writeString(view, 0, 'RIFF');
            view.setUint32(4, totalLength - 8, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * 2, true);
            view.setUint16(32, numChannels * 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, pcmLength, true);

            const wavBytes = new Uint8Array(totalLength);
            wavBytes.set(new Uint8Array(header), 0);
            wavBytes.set(new Uint8Array(pcmData), 44);
            return new Blob([wavBytes], { type: 'audio/wav' });
        }

        // ---------- Chat helpers ----------
        const createMessageDiv = (className) => {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', className);
            const textDiv = document.createElement('div');
            textDiv.classList.add('message-text');
            messageDiv.appendChild(textDiv);
            chatContainer.appendChild(messageDiv);
            return messageDiv;
        };

        // ---------- WebSocket status helper ----------
        const setWsStatus = (state, label) => {
            if (!wsStatusEl) return;
            wsStatusEl.classList.remove('connected', 'disconnected', 'connecting');
            wsStatusEl.classList.add(state);
            if (wsStatusText) wsStatusText.textContent = label;
        };

        const setLiveApiStatus = (state, label) => {
            if (!liveApiStatusEl) return;
            liveApiStatusEl.classList.remove('connected', 'disconnected', 'connecting');
            liveApiStatusEl.classList.add(state);
            if (liveApiStatusText) liveApiStatusText.textContent = label;
        };

        const liveApiLabelFor = (state) => {
            switch (state) {
                case 'connected':    return 'Connected';
                case 'connecting':   return 'Connecting…';
                case 'error':        return 'Error';
                case 'disconnected':
                default:             return 'Disconnected';
            }
        };

        // ---------- WebSocket ----------
        let wsReconnectTimer = null;
        const connectWebSocket = () => {
            setWsStatus('connecting', 'Connecting…');
            socket = new WebSocket('ws://localhost:8000/ws');

            socket.onopen = () => {
                console.log('WebSocket connection established');
                setWsStatus('connected', 'Connected');
            };
            socket.onclose = () => {
                console.log('WebSocket connection closed');
                setWsStatus('disconnected', 'Disconnected');
                // Without a WebSocket we can't know the Live API state either.
                setLiveApiStatus('disconnected', 'Unknown');
                // Attempt to auto-reconnect after a short delay.
                if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
                wsReconnectTimer = setTimeout(() => {
                    wsReconnectTimer = null;
                    connectWebSocket();
                }, 2000);
            };
            socket.onerror = (err) => {
                console.error('WebSocket error:', err);
                setWsStatus('disconnected', 'Error');
            };

            socket.onmessage = (event) => {
                if (event.data instanceof Blob) {
                    // Track this promise so turn_complete can wait for all
                    // in-flight arrayBuffer() resolutions before flushing.
                    // This prevents the race where turn_complete JSON arrives
                    // before the last blob's .then() has resolved.
                    const p = event.data.arrayBuffer().then(buffer => {
                        // Remove this promise from the pending list.
                        pendingBlobPromises = pendingBlobPromises.filter(x => x !== p);
                        if (playbackMode === 'turn_complete') {
                            pendingTurnChunks.push(buffer);
                        } else {
                            enqueueWavFromPcm(buffer);
                        }
                    });
                    pendingBlobPromises.push(p);
                    return;
                }

                const data = JSON.parse(event.data);

                if (data.live_api_status) {
                    const state = data.live_api_status.state || 'disconnected';
                    setLiveApiStatus(state, liveApiLabelFor(state));
                }

                if (data.input_transcription) {
                    if (!userMessageDiv || botMessageDiv) {
                        userMessageDiv = createMessageDiv('user-message');
                        botMessageDiv = null;
                    }
                    userMessageDiv.querySelector('.message-text').innerHTML += data.input_transcription;
                }

                if (data.output_transcription) {
                    if (!botMessageDiv || userMessageDiv) {
                        botMessageDiv = createMessageDiv('bot-message');
                        userMessageDiv = null;
                    }
                    botMessageDiv.querySelector('.message-text').innerHTML += data.output_transcription;
                }

                if (data.turn_complete) {
                    if (playbackMode === 'turn_complete') {
                        // Wait for all in-flight blob→ArrayBuffer conversions to
                        // complete before flushing so no chunks are missed.
                        const snapshotPromises = pendingBlobPromises.slice();
                        Promise.all(snapshotPromises).then(() => {
                            flushPendingTurn();
                        });
                    }
                    userMessageDiv = null;
                    botMessageDiv = null;
                }

                chatContainer.scrollTop = chatContainer.scrollHeight;
            };
        };

        // ---------- Recording ----------
        const startRecording = async () => {
            recordedChunks = [];
            userMessageDiv = null;
            botMessageDiv = null;
            // Clear any leftover buffered state from a previous turn.
            pendingTurnChunks = [];
            pendingBlobPromises = [];
            try {
                globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });

                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                await audioContext.audioWorklet.addModule('/static/audio-processor.js');
                audioWorkletNode = new AudioWorkletNode(audioContext, 'audio-processor');

                audioWorkletNode.port.onmessage = (event) => {
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        socket.send(event.data);
                        recordedChunks.push(event.data);
                    }
                };

                input = audioContext.createMediaStreamSource(globalStream);
                input.connect(audioWorkletNode);
                audioWorkletNode.connect(audioContext.destination);

                // Signal the server to open a new Live API session now.
                // The WebSocket connection itself remains persistent between recordings.
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ action: 'start_session' }));
                }

                startBtn.disabled = true;
                stopBtn.disabled = false;
            } catch (err) {
                console.error('Error starting recording:', err);
            }
        };

        const stopRecording = () => {
            if (globalStream) globalStream.getTracks().forEach(track => track.stop());
            if (audioWorkletNode) audioWorkletNode.disconnect();
            if (input) input.disconnect();
            if (audioContext) audioContext.close();

            // Signal the server to close the current Live API session so a
            // fresh one is ready for the next Start Recording press.
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ action: 'stop_session' }));
            }

            if (userMessageDiv && recordedChunks.length > 0) {
                const totalLength = recordedChunks.reduce((acc, value) => acc + value.byteLength, 0);
                const combined = new Uint8Array(totalLength);
                let offset = 0;
                for (const chunk of recordedChunks) {
                    combined.set(new Uint8Array(chunk), offset);
                    offset += chunk.byteLength;
                }
                const blob = pcmToWav(combined.buffer, 16000, 1);
                const player = document.createElement('audio');
                player.controls = true;
                player.src = URL.createObjectURL(blob);
                userMessageDiv.appendChild(player);
            }

            startBtn.disabled = false;
            stopBtn.disabled = true;
        };

        // ---------- Language selection ----------
        const updateLanguages = () => {
            if (!socket || socket.readyState !== WebSocket.OPEN) return;
            const sourceCode = languageASelect.value;
            const targetCode = languageBSelect.value;
            const sourceName = languageASelect.options[languageASelect.selectedIndex].text;
            const targetName = languageBSelect.options[languageBSelect.selectedIndex].text;
            socket.send(JSON.stringify({
                source_language: sourceName,
                source_language_code: sourceCode,
                target_language: targetName,
                target_language_code: targetCode,
            }));
            const infoDiv = createMessageDiv('bot-message');
            infoDiv.style.backgroundColor = '#e3f2fd';
            infoDiv.querySelector('.message-text').innerHTML =
                `<strong>[Languages updated]</strong><br>A: ${sourceName} [${sourceCode}]<br>B: ${targetName} [${targetCode}]`;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        };

        // ---------- Wire up events ----------
        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        applyLangBtn.addEventListener('click', updateLanguages);

        connectWebSocket();
    </script>
</body>
</html>
